name: Generate & Deploy Calendar

on:
  push:
    branches: [main]
  schedule:
    # 每天北京时间凌晨2点运行 (UTC 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch:  # 允许手动触发
    inputs:
      years:
        description: '生成年份范围 (例如: 2024-2027)'
        required: false
        default: ''
      force_generate:
        description: '强制重新生成所有文件'
        required: false
        default: 'false'
        type: boolean

# 设置 GITHUB_TOKEN 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --production
      
      - name: Generate ICS files
        run: |
          echo "🏭 开始生成日历文件..."
          if [ -n "${{ github.event.inputs.years }}" ]; then
            node src/index.js --years ${{ github.event.inputs.years }}
          else
            node src/index.js
          fi
          echo "✅ 生成完成"
          ls -lh output/
      
      - name: Generate index.html (with cache info)
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          node src/generate-index.js output "${GITHUB_REPOSITORY_OWNER}" "${GITHUB_REPOSITORY_NAME}" "${TIMESTAMP}"
          echo "✅ index.html 已更新（含定制功能）"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
